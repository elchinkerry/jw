<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>À la découverte des trésors bibliques (Enfants)</title>
    <style>
        :root {
            --bg-color: #0B1B3D;
            --gold: #D4AF37;
            --gold-hover: #b5952f;
            --text-color: #ffffff;
            --btn-bg: rgba(255, 255, 255, 0.1);
            --correct-bg: #28a745;
            --wrong-bg: #dc3545;
            --selected-bg: #ffc107;
            --safe-color: #17a2b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Screens */
        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        h1 {
            color: var(--gold);
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 1.5rem;
            color: #fff;
            display: block;
            margin-top: 0.5rem;
        }

        .btn {
            background-color: var(--gold);
            color: var(--bg-color);
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.25rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn:hover {
            background-color: var(--gold-hover);
            transform: translateY(-2px);
        }

        /* Main Game Layout */
        .game-layout {
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 1200px;
            gap: 2rem;
            padding: 1rem;
        }

        .main-area {
            flex: 3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column-reverse; /* Bottom to top */
            justify-content: space-between;
            border: 2px solid var(--gold);
            max-height: 80vh;
        }

        .step {
            padding: 0.5rem 1rem;
            margin: 0.2rem 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: #aaa;
            transition: all 0.3s ease;
        }

        .step.safe {
            color: var(--text-color);
        }

        .step.current {
            background-color: var(--gold);
            color: var(--bg-color);
            transform: scale(1.05);
            box-shadow: 0 0 10px var(--gold);
        }

        .step.passed {
            color: var(--gold);
        }

        /* Lifelines */
        .lifelines {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .lifeline-btn {
            background: var(--bg-color);
            border: 2px solid var(--gold);
            color: var(--gold);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .lifeline-btn:hover:not(:disabled) {
            background: var(--gold);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--gold);
        }

        .lifeline-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #555;
            color: #555;
        }
        
        .lifeline-btn:disabled::after {
            content: '❌';
            position: absolute;
            font-size: 2rem;
            color: red;
            opacity: 0.8;
        }

        /* Question & Answers */
        .question-box {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 2rem;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .answer-btn {
            background: var(--btn-bg);
            border: 2px solid var(--gold);
            color: var(--text-color);
            padding: 1.5rem;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .answer-btn:hover:not(:disabled) {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: inset 0 0 10px var(--gold);
        }

        .answer-btn.selected {
            background: var(--selected-bg) !important;
            color: #000;
            border-color: var(--selected-bg);
        }

        .answer-btn.correct {
            background: var(--correct-bg) !important;
            color: #fff;
            border-color: var(--correct-bg);
        }

        .answer-btn.wrong {
            background: var(--wrong-bg) !important;
            color: #fff;
            border-color: var(--wrong-bg);
        }

        .answer-letter {
            color: var(--gold);
            font-weight: bold;
            margin-right: 1rem;
        }
        
        .selected .answer-letter, .correct .answer-letter, .wrong .answer-letter {
            color: inherit;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-color);
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .modal-content h2 {
            color: var(--gold);
            margin-bottom: 1.5rem;
        }
        
        /* Bar chart */
        .chart-container {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 200px;
            margin: 2rem 0;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--gold);
            position: relative;
        }
        
        .bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 20%;
        }
        
        .bar {
            width: 100%;
            background: var(--gold);
            border-radius: 4px 4px 0 0;
            transition: height 1s ease-out;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        
        .bar-label {
            margin-top: 10px;
            font-weight: bold;
            color: var(--gold);
        }
        
        .bar-value {
            position: relative;
            top: -25px;
            color: #fff;
            font-weight: bold;
        }

        .close-btn {
            background: var(--btn-bg);
            border: 1px solid var(--gold);
            color: var(--text-color);
            padding: 0.5rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
        }

        #friend-message {
            font-style: italic;
            font-size: 1.2rem;
            padding: 1.5rem;
            background: rgba(255,255,255,0.05);
            border-left: 4px solid var(--gold);
            border-radius: 4px;
            margin: 1.5rem 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .game-layout {
                flex-direction: column;
            }
            .sidebar {
                flex-direction: row;
                flex-wrap: wrap;
                max-height: none;
                padding: 1rem;
            }
            .step {
                font-size: 0.8rem;
                padding: 0.3rem 0.5rem;
            }
            .answers-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <h1>
            À la découverte des trésors bibliques
            <span class="subtitle">Édition Enfants 🎈</span>
        </h1>
        <button class="btn" onclick="startGame()" style="margin-bottom: 1rem;">Commencer l'aventure !</button>
        <br><a href="index.html" class="btn" style="background: transparent; border: 2px solid var(--gold); color: var(--gold); text-decoration: none; display: inline-block;">Retour au Menu</a>
    </div>

    <!-- Main Game Screen -->
    <div id="game-screen" class="screen">
        <div class="game-layout">
            <div class="main-area">
                <div class="lifelines">
                    <button id="ll-5050" class="lifeline-btn" title="50/50" onclick="useLifeline('5050')">50:50</button>
                    <button id="ll-audience" class="lifeline-btn" title="Avis du public" onclick="useLifeline('audience')">👥</button>
                    <button id="ll-phone" class="lifeline-btn" title="Appel à un ami" onclick="useLifeline('phone')">📞</button>
                </div>

                <div id="question-text" class="question-box">
                    Question text goes here...
                </div>

                <div class="answers-grid" id="answers-container">
                    <!-- Answers generated via JS -->
                </div>
            </div>
            
            <div class="sidebar" id="progress-bar">
                <!-- Steps generated via JS -->
            </div>
        </div>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="screen">
        <h1 id="end-title">Game Over</h1>
        <h2 id="end-message" style="margin-bottom: 2rem; color: #fff;"></h2>
        <button class="btn" onclick="restartGame()" style="margin-bottom: 1rem;">Rejouer 🔄</button>
        <br><a href="index.html" class="btn" style="background: transparent; border: 2px solid var(--gold); color: var(--gold); text-decoration: none; display: inline-block;">Retour au Menu</a>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title">Modal Title</h2>
            <div id="modal-body"></div>
            <button class="close-btn" onclick="closeModal()">Fermer</button>
        </div>
    </div>

<script>
    // --- Data ---
    const questionsData = [
        // Level 1: (1-5)
        { q: "Qui a créé toutes les étoiles, les animaux et les fleurs ?", options: ["Jésus", "Les anges", "Jéhovah", "Moïse"], correct: 2 },
        { q: "Quel oiseau Noé a-t-il envoyé et qui est revenu avec une petite feuille d'olivier ?", options: ["Un aigle", "Un corbeau", "Une colombe", "Un perroquet"], correct: 2 },
        { q: "Quel jeune berger a été courageux et a battu le géant Goliath ?", options: ["Salomon", "David", "Saül", "Jonathan"], correct: 1 },
        { q: "Comment s'appelait la maman de Jésus sur la terre ?", options: ["Marthe", "Marie", "Ève", "Sara"], correct: 1 },
        { q: "Dans le ventre de quel grand animal Jonas a-t-il prié Jéhovah ?", options: ["Un gros poisson", "Un requin", "Un crocodile", "Un hippopotame"], correct: 0 },
        
        // Level 2: (6-10)
        { q: "Quel beau vêtement spécial Joseph a-t-il reçu de son papa Jacob ?", options: ["Des sandales en or", "Une couronne", "Un long vêtement rayé", "Un manteau d'hiver"], correct: 2 },
        { q: "Quelle mer Jéhovah a-t-il ouverte en deux pour laisser passer les Israélites ?", options: ["La mer Morte", "La mer Rouge", "La mer de Galilée", "La mer Méditerranée"], correct: 1 },
        { q: "Comment s'appelait le magnifique jardin où habitaient Adam et Ève au début ?", options: ["Le jardin de Gethsémané", "Le jardin de Babylone", "Le jardin d'Éden", "Le parc de Jérusalem"], correct: 2 },
        { q: "Quel petit garçon a entendu Jéhovah l'appeler la nuit pendant qu'il dormait au tabernacle ?", options: ["Samuel", "Isaac", "Ismaël", "Jean"], correct: 0 },
        { q: "Avec quoi Jésus a-t-il nourri une très grande foule de personnes qui avaient faim ?", options: ["Beaucoup de fruits", "5 pains et 2 petits poissons", "Du lait et du miel", "De la manne"], correct: 1 },
        
        // Level 3: (11-15)
        { q: "Comment s'appelait la nourriture blanche et sucrée qui tombait du ciel dans le désert ?", options: ["La manne", "Le pain azyme", "Le riz", "Le blé"], correct: 0 },
        { q: "Quel roi aimait tellement Jéhovah qu'il a commencé à régner alors qu'il n'avait que 8 ans ?", options: ["David", "Salomon", "Josias", "Hérode"], correct: 2 },
        { q: "Qui est le meilleur ami de Jéhovah, la toute première personne qu'il a créée au ciel ?", options: ["L'ange Gabriel", "L'apôtre Pierre", "Jésus Christ", "Abraham"], correct: 2 },
        { q: "Quel homme de petite taille est monté dans un arbre pour pouvoir voir Jésus passer ?", options: ["Zachée", "Matthieu", "Thomas", "Nicodème"], correct: 0 },
        { q: "Que promet Jéhovah de faire de toute la terre dans le futur ?", options: ["Un grand désert", "Un paradis magnifique", "Une très grande ville", "Un océan géant"], correct: 1 }
    ];

    const rewards = [
        "1", "2", "3", "4", "5 (Palier)", 
        "6", "7", "8", "9", "10 (Palier)", 
        "11", "12", "13", "14", "15 (Trésor 😊)"
    ];

    // --- State ---
    let stopAllMusic(); currentQuestionIndex = 0;
    let isAnswering = false;
    let lifelines = { '5050': true, 'audience': true, 'phone': true };
    let safeHavenIndex = -1;

    const sfx = {
        bg1: new Audio('sounds/bg_1.mp3'),
        bg2: new Audio('sounds/bg_2.mp3'),
        bg3: new Audio('sounds/bg_3.mp3'),
        correct: new Audio('sounds/correct.mp3'),
        wrong: new Audio('sounds/wrong.mp3'),
        final: new Audio('sounds/final.mp3'),
        ll5050: new Audio('sounds/5050.mp3'),
        llAudience: new Audio('sounds/audience.mp3'),
        llPhone: new Audio('sounds/phone.mp3')
    };
    
    sfx.bg1.loop = true; sfx.bg2.loop = true; sfx.bg3.loop = true;
    let currentBg = null;
    function playBg(index) {
        if (currentBg) { currentBg.pause(); currentBg.currentTime = 0; }
        if (index < 5) currentBg = sfx.bg1;
        else if (index < 10) currentBg = sfx.bg2;
        else currentBg = sfx.bg3;
        let p = currentBg.play();
        if (p !== undefined) p.catch(e => console.log('Audio autoplay blocked'));
    }
    function stopAllMusic() { Object.values(sfx).forEach(a => { a.pause(); a.currentTime = 0; }); } 

    // --- DOM Elements ---
    const screens = {
        start: document.getElementById('start-screen'),
        game: document.getElementById('game-screen'),
        end: document.getElementById('end-screen')
    };
    const questionText = document.getElementById('question-text');
    const answersContainer = document.getElementById('answers-container');
    const progressBar = document.getElementById('progress-bar');
    const modalContainer = document.getElementById('modal-container');
    
    // --- Logic ---
    function showScreen(screenName) {
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[screenName].classList.add('active');
    }

    function initProgressBar() {
        progressBar.innerHTML = '';
        for (let i = rewards.length - 1; i >= 0; i--) {
            const div = document.createElement('div');
            div.className = 'step';
            div.id = `step-${i}`;
            if (i === 4 || i === 9 || i === 14) div.classList.add('safe');
            
            div.innerHTML = `<span>${i + 1}</span> <span>${rewards[i]}</span>`;
            progressBar.appendChild(div);
        }
    }

    function updateProgressBar() {
        for (let i = 0; i < rewards.length; i++) {
            const el = document.getElementById(`step-${i}`);
            el.classList.remove('current', 'passed');
            if (i < currentQuestionIndex) {
                el.classList.add('passed');
            } else if (i === currentQuestionIndex) {
                el.classList.add('current');
            }
        }
    }

    function startGame() {
        stopAllMusic(); currentQuestionIndex = 0;
        safeHavenIndex = -1;
        isAnswering = false;
        lifelines = { '5050': true, 'audience': true, 'phone': true };
        
        document.getElementById('ll-5050').disabled = false;
        document.getElementById('ll-audience').disabled = false;
        document.getElementById('ll-phone').disabled = false;

        initProgressBar();
        playBg(0);
        renderQuestion();
        showScreen('game');
    }

    function renderQuestion() {
        isAnswering = false;
        if (!currentBg || currentBg.paused) playBg(currentQuestionIndex);
        updateProgressBar();
        const q = questionsData[currentQuestionIndex];
        questionText.textContent = q.q;
        
        answersContainer.innerHTML = '';
        const letters = ['A', 'B', 'C', 'D'];
        
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'answer-btn';
            btn.id = `btn-${idx}`;
            btn.innerHTML = `<span class="answer-letter">${letters[idx]}:</span> ${opt}`;
            btn.onclick = () => selectAnswer(idx);
            answersContainer.appendChild(btn);
        });
    }

    function selectAnswer(selectedIndex) {
        if (isAnswering) return;
        isAnswering = true;
        stopAllMusic();
        sfx.final.play();
        const q = questionsData[currentQuestionIndex];
        const selectedBtn = document.getElementById(`btn-${selectedIndex}`);
        const correctBtn = document.getElementById(`btn-${q.correct}`);

        document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);
        
        selectedBtn.classList.add('selected');

        setTimeout(() => {
            sfx.final.pause(); sfx.final.currentTime = 0; selectedBtn.classList.remove('selected');
            correctBtn.classList.add('correct');
            
            if (selectedIndex === q.correct) {
                sfx.correct.play();
                if (currentQuestionIndex === 4 || currentQuestionIndex === 9) {
                    safeHavenIndex = currentQuestionIndex;
                }
                
                setTimeout(() => {
                    currentQuestionIndex++;
                    if (currentQuestionIndex < questionsData.length) {
                        renderQuestion();
                    } else {
                        endGame(true);
                    }
                }, 4000);
            } else {
                sfx.wrong.play();
                selectedBtn.classList.add('wrong');
                // Даем игроку 3.5 секунды (вместо 2.5), чтобы он успел выучить правильный (зеленый) ответ
                setTimeout(() => {
                    endGame(false);
                }, 3500);
            }
        }, 2000);
    }

    function endGame(isVictory) {
        stopAllMusic();
        showScreen('end');
        if (isVictory) {
            document.getElementById('end-title').textContent = "Bravo les amis ! 🎉";
            document.getElementById('end-message').textContent = "Félicitations ! Vous avez découvert le grand trésor biblique ! Joli travail !";
            document.getElementById('end-title').style.color = "var(--correct-bg)";
        } else {
            document.getElementById('end-title').textContent = "Oh non ! 😢";
            document.getElementById('end-title').style.color = "var(--wrong-bg)";
            let text = "C'est pas grave, l'important c'est de participer !";
            if (safeHavenIndex >= 0) {
                text += `\nEn plus, vous avez gardé les points du palier ${safeHavenIndex + 1} ! Super !`;
            } else {
                text += "\nOn réessaie pour faire encore mieux ?";
            }
            document.getElementById('end-message').innerText = text;
        }
    }

    function restartGame() {
        startGame();
    }

    // --- Lifelines ---
    function useLifeline(type) {
        if (!lifelines[type] || isAnswering) return;
        
        lifelines[type] = false;
        document.getElementById(`ll-${type}`).disabled = true;

        const q = questionsData[currentQuestionIndex];

        if (type === '5050') {
            sfx.ll5050.play();
            apply5050(q);
        } else if (type === 'audience') {
            sfx.llAudience.play();
            showAudiencePoll(q);
        } else if (type === 'phone') {
            sfx.llPhone.play();
            showFriendCall(q);
        }
    }

    function apply5050(q) {
        let wrongIndices = [0, 1, 2, 3].filter(i => i !== q.correct);
        wrongIndices.sort(() => Math.random() - 0.5);
        let toHide = wrongIndices.slice(0, 2);
        
        toHide.forEach(idx => {
            const btn = document.getElementById(`btn-${idx}`);
            btn.innerHTML = '';
            btn.disabled = true;
            btn.style.cursor = 'default';
            btn.style.background = 'transparent';
            btn.style.borderColor = 'transparent';
        });
    }

    function showAudiencePoll(q) {
        document.getElementById('modal-title').textContent = "L'avis de tes amis 👥";
        
        let values = [0,0,0,0];
        let remaining = 100;
        
        const correctVal = Math.floor(Math.random() * 41) + 40; // 40-80%
        values[q.correct] = correctVal;
        remaining -= correctVal;
        
        const others = [0,1,2,3].filter(i => i !== q.correct);
        others.forEach((idx, i) => {
            if (i === 2) {
                values[idx] = remaining;
            } else {
                const val = Math.floor(Math.random() * (remaining * 0.7));
                values[idx] = val;
                remaining -= val;
            }
        });

        const letters = ['A', 'B', 'C', 'D'];
        
        let html = '<div class="chart-container">';
        values.forEach((val, idx) => {
            const btn = document.getElementById(`btn-${idx}`);
            if (btn && btn.disabled && btn.innerHTML === '') {
                val = 0; // Was eliminated by 50:50
            }
            html += `
                <div class="bar-wrapper">
                    <div class="bar-value">${val}%</div>
                    <div class="bar" style="height: ${val}%"></div>
                    <div class="bar-label">${letters[idx]}</div>
                </div>
            `;
        });
        html += '</div>';

        document.getElementById('modal-body').innerHTML = html;
        modalContainer.classList.add('active');
    }

    function showFriendCall(q) {
        document.getElementById('modal-title').textContent = "Appel à un ami (Papa ou Maman ?) 📞";
        const letters = ['A', 'B', 'C', 'D'];
        
        const confidence = Math.random() > 0.3 ? "Je suis presque sûr que c'est" : "Je crois bien que c'est";
        
        document.getElementById('modal-body').innerHTML = `
            <div id="friend-message">
                "Coucou ! J'ai lu cette histoire récemment... ${confidence} la réponse <strong>${letters[q.correct]}</strong> ! Fonce !"
            </div>
        `;
        modalContainer.classList.add('active');
    }

    function closeModal() {
        modalContainer.classList.remove('active');
    }

</script>
</body>
</html>
